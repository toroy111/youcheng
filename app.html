<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企業雲端人事管理系統</title>
    <style>
        :root {
            --primary: #1e293b;
            --accent: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #334155;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 20px; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        .container { width: 100%; max-width: 1000px; background: var(--card); border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 30px; display: none; }
        
        .auth-box { width: 100%; max-width: 400px; background: var(--card); padding: 35px 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .auth-box h2 { text-align: center; margin-bottom: 20px; color: var(--primary); font-weight: 700; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
        .form-group input, .form-group select { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; }
        .form-group input:focus { border-color: var(--accent); }
        
        .btn { width: 100%; padding: 11px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; color: white; transition: background 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-accent { background-color: var(--accent); }
        .btn-accent:hover { background-color: #1d4ed8; }
        .btn-success { background-color: var(--success); }
        .btn-danger { background-color: var(--danger); }

        .auth-links { display: flex; justify-content: space-between; margin-top: 15px; font-size: 13px; }
        .auth-links a { color: var(--accent); text-decoration: none; cursor: pointer; }
        .auth-links a:hover { text-decoration: underline; }

        .main-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-bottom: 25px; }
        .btn-logout { width: auto; padding: 6px 12px; font-size: 13px; background-color: #64748b; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 25px; }
        @media(min-width: 768px) { .dashboard-grid { grid-template-columns: 1fr 1fr; } .full-width { grid-column: span 2; } }

        .card { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .card h3 { font-size: 17px; margin-bottom: 15px; color: var(--primary); display: flex; align-items: center; gap: 8px; border-left: 4px solid var(--accent); padding-left: 10px; }

        .clock-box { text-align: center; background: #fff; padding: 15px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 15px; }
        #current-time { font-size: 28px; font-weight: 700; color: var(--accent); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .info-list { list-style: none; max-height: 200px; overflow-y: auto; }
        .info-item { background: #fff; padding: 12px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 10px; font-size: 14px; }
        .info-item .time { font-size: 12px; color: #94a3b8; margin-top: 5px; text-align: right; }
        .badge-reminder { background-color: #fef3c7; color: #d97706; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-right: 5px; }

        .admin-only { display: none; }
        .table-container { background: #fff; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th, td { padding: 12px 15px; border-bottom: 1px solid var(--border); }
        th { background-color: #f1f5f9; font-weight: 600; }
        .badge { padding: 3px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .badge-in { background-color: #dcfce7; color: var(--success); }
        .badge-out { background-color: #fee2e2; color: var(--danger); }
    </style>
</head>
<body>

<div class="auth-box" id="login-section">
    <h2>員工登入</h2>
    <div class="form-group">
        <label>電子郵件 (Email)</label>
        <input type="email" id="login-email" placeholder="example@company.com">
    </div>
    <div class="form-group">
        <label>密碼</label>
        <input type="password" id="login-password" placeholder="請輸入密碼">
    </div>
    <button class="btn btn-accent" onclick="authAction('login')">安全登入</button>
    <div class="auth-links">
        <a onclick="switchAuthView('register')">註冊新帳號</a>
        <a onclick="switchAuthView('forgot')">忘記密碼？</a>
    </div>
</div>

<div class="auth-box" id="register-section" style="display: none;">
    <h2>職員帳號註冊</h2>
    <div class="form-group">
        <label>真實姓名</label>
        <input type="text" id="reg-name" placeholder="例如：張小明">
    </div>
    <div class="form-group">
        <label>電子郵件 (做為登入帳號)</label>
        <input type="email" id="reg-email" placeholder="請填寫正確 Email">
    </div>
    <div class="form-group">
        <label>設定密碼 (至少 6 碼)</label>
        <input type="password" id="reg-password" placeholder="請設定登入密碼">
    </div>
    <button class="btn btn-success" onclick="authAction('register')">建立帳號</button>
    <div class="auth-links" style="justify-content: center;">
        <a onclick="switchAuthView('login')">返回登入畫面</a>
    </div>
</div>

<div class="auth-box" id="forgot-section" style="display: none;">
    <h2>找回密碼</h2>
    <p style="font-size: 13px; color: #64748b; margin-bottom: 15px; text-align: center;">輸入註冊的 Email，系統會自動寄送密碼重設信給您。</p>
    <div class="form-group">
        <label>您的電子郵件 (Email)</label>
        <input type="email" id="forgot-email" placeholder="example@company.com">
    </div>
    <button class="btn btn-accent" onclick="authAction('forgot')">發送重設密碼信</button>
    <div class="auth-links" style="justify-content: center;">
        <a onclick="switchAuthView('login')">返回登入畫面</a>
    </div>
</div>


<div class="container" id="main-system">
    <div class="main-header">
        <div class="user-info">
            歡迎回來，<strong id="user-display-name">載入中...</strong> 
            [<span id="user-role-tag" style="color: var(--accent); font-weight: bold;">讀取中...</span>]
        </div>
        <button class="btn btn-logout" onclick="handleLogout()">登出系統</button>
    </div>

    <div class="dashboard-grid">
        <div class="card">
            <h3>⏰ 每日出勤簽到</h3>
            <div class="clock-box">
                <div id="current-date" style="font-size: 14px; color: #64748b;"></div>
                <div id="current-time">00:00:00</div>
            </div>
            <div class="grid-2">
                <button class="btn btn-success" onclick="submitClock('上班')">🌅 上班打卡</button>
                <button class="btn btn-danger" onclick="submitClock('下班')">外出/下班</button>
            </div>
        </div>

        <div class="card">
            <h3>📢 公司公告與工作提醒</h3>
            <ul class="info-list" id="announcement-list"></ul>
        </div>

        <div class="card full-width admin-only">
            <h3>🛠️ 主管行政管理控制台</h3>
            <div class="grid-2" style="margin-bottom: 20px; background: #fff; padding: 15px; border-radius: 8px; border:1px solid var(--border)">
                <div>
                    <h4 style="margin-bottom: 10px; font-size: 14px;">發布新公告 / 工作提醒</h4>
                    <div class="form-group">
                        <select id="msg-type">
                            <option value="公告">📢 一般公司公告</option>
                            <option value="提醒">⚠️ 緊急工作提醒</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 10px;">
                        <input type="text" id="msg-content" placeholder="請輸入發布內容...">
                    </div>
                    <button class="btn btn-accent" style="padding: 8px;" onclick="submitPost()">確認發布</button>
                </div>
                <div style="border-left: 1px solid var(--border); padding-left: 20px; display: flex; flex-direction: column; justify-content: center;">
                    <h4 style="margin-bottom: 10px; font-size: 14px;">數據報表匯出</h4>
                    <button class="btn btn-success" onclick="exportCSV()">📥 匯出全公司打卡紀錄 (CSV)</button>
                </div>
            </div>

            <h4 style="font-size: 14px; margin-bottom: 5px;">全公司即時打卡流水帳</h4>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>員工姓名</th>
                            <th>帳號 (Email)</th>
                            <th>打卡類型</th>
                            <th>日期</th>
                            <th>精準時間</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, set, get, child, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // ⚠️ 請仔細對照，必須用「英文半形」的雙引號或單引號包住字串
    const firebaseConfig = {
        apiKey: "AIzaSyDfTTRHfVCW-QpAPYuoDA4absfWO9OARcY", 
        authDomain: "youcheng-656a8.firebaseapp.com",
        databaseURL: "https://youcheng-656a8-default-rtdb.firebaseio.com",
        projectId: "youcheng-656a8",
        storageBucket: "youcheng-656a8.firebasestorage.app",
        messagingSenderId: "197356167437",
        appId: "1:197356167437:web:fa86347694f3ab592a5044"
    }; // 👈 檢查這裡的 }; 有沒有漏掉，結尾要

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentUserData = null;
    let currentAuthUser = null;
    let allClockRecords = [];

    // 1. 驗證切換畫面控制
    window.switchAuthView = function(view) {
        document.getElementById('login-section').style.display = view === 'login' ? 'block' : 'none';
        document.getElementById('register-section').style.display = view === 'register' ? 'block' : 'none';
        document.getElementById('forgot-section').style.display = view === 'forgot' ? 'block' : 'none';
    }

    // 2. 驗證動作核心
    window.authAction = function(type) {
        if (type === 'register') {
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;

            // 🛠️ 修正後的檢查邏輯，不再檢查員編
            if (!name || !email || !password) { alert('請填寫所有欄位！'); return; }
            
            createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    const uid = userCredential.user.uid;
                    // 將基本資料存入 Realtime Database
                    set(ref(db, `users/${uid}`), {
                        name: name,
                        email: email,
                        role: 'staff' 
                    }).then(() => {
                        alert('帳號註冊成功！系統已為您自動登入。');
                    });
                })
                .catch(err => alert('註冊失敗：' + err.message));

        } else if (type === 'login') {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            if (!email || !password) { alert('請輸入帳號密碼！'); return; }

            signInWithEmailAndPassword(auth, email, password)
                .catch(err => alert('登入失敗：帳號密碼錯誤或不存在！'));

        } else if (type === 'forgot') {
            const email = document.getElementById('forgot-email').value.trim();
            if (!email) { alert('請輸入 Email！'); return; }

            sendPasswordResetEmail(auth, email)
                .then(() => {
                    alert('密碼重設郵件已發送！請檢查您的收件匣。');
                    switchAuthView('login');
                })
                .catch(err => alert('發送失敗：' + err.message));
        }
    }

    // 3. 監聽登入狀態改變
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentAuthUser = user;
            get(child(ref(db), `users/${user.uid}`)).then((snapshot) => {
                if (snapshot.exists()) {
                    currentUserData = snapshot.val();
                    
                    document.querySelectorAll('.auth-box').forEach(el => el.style.display = 'none');
                    document.getElementById('main-system').style.display = 'block';
                    document.body.style.alignItems = 'flex-start';

                    document.getElementById('user-display-name').innerText = currentUserData.name;
                    
                    if (currentUserData.role === 'admin') {
                        document.getElementById('user-role-tag').innerText = '最高管理權限 / 主管';
                        document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
                    } else {
                        document.getElementById('user-role-tag').innerText = '一般職員';
                        document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
                    }

                    initDataListeners();
                }
            });
        } else {
            document.getElementById('main-system').style.display = 'none';
            switchAuthView('login');
            document.body.style.alignItems = 'center';
        }
    });

    // 4. 登出
    window.handleLogout = function() {
        signOut(auth).then(() => { currentUserData = null; currentAuthUser = null; });
    }

    // 5. 提交打卡
    window.submitClock = function(type) {
        if (!currentUserData || !currentAuthUser) return;
        const now = new Date();
        const dateStr = now.toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' });
        const timeStr = now.toLocaleTimeString('zh-TW', { hour12: false });

        const log = {
            uid: currentAuthUser.uid,
            name: currentUserData.name,
            email: currentUserData.email,
            type: type,
            date: dateStr,
            time: timeStr,
            timestamp: Date.now()
        };

        push(ref(db, 'clock_records'), log).then(() => {
            alert(`【${type}打卡成功】\n時間：${timeStr}`);
        });
    }

    // 6. 主管發布公告
    window.submitPost = function() {
        const type = document.getElementById('msg-type').value;
        const content = document.getElementById('msg-content').value.trim();
        if (!content) { alert('請填寫內容！'); return; }

        push(ref(db, 'announcements'), {
            type: type,
            content: content,
            timestamp: Date.now()
        }).then(() => {
            alert('公告發布成功！');
            document.getElementById('msg-content').value = '';
        });
    }

    // 7. 即時雲端監聽
    function initDataListeners() {
        onValue(ref(db, 'announcements'), (snapshot) => {
            const listEl = document.getElementById('announcement-list');
            listEl.innerHTML = '';
            const data = snapshot.val();
            if (!data) { listEl.innerHTML = '<li class="info-item">目前沒有任何公告。</li>'; return; }
            
            const arr = Object.keys(data).map(k => data[k]).sort((a,b) => b.timestamp - a.timestamp);
            arr.forEach(item => {
                const li = document.createElement('li');
                li.className = 'info-item';
                const prefix = item.type === '提醒' ? '<span class="badge-reminder">工作提醒</span>' : '📢 ';
                const timeStr = new Date(item.timestamp).toLocaleString('zh-TW', {hour12:false});
                li.innerHTML = `<div>${prefix} ${item.content}</div><div class="time">${timeStr}</div>`;
                listEl.appendChild(li);
            });
        });

        onValue(ref(db, 'clock_records'), (snapshot) => {
            allClockRecords = [];
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = '';
            const data = snapshot.val();
            if (!data) { tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">尚無打卡資料</td></tr>'; return; }

            Object.keys(data).forEach(k => allClockRecords.push(data[k]));
            allClockRecords.sort((a,b) => b.timestamp - a.timestamp);

            if (currentUserData.role === 'admin') {
                allClockRecords.forEach(item => {
                    const tr = document.createElement('tr');
                    const badgeClass = item.type === '上班' ? 'badge-in' : 'badge-out';
                    tr.innerHTML = `
                        <td><strong>${item.name}</strong></td>
                        <td style="color:#64748b; font-size:13px;">${item.email}</td>
                        <td><span class="badge ${badgeClass}">${item.type}</span></td>
                        <td>${item.date}</td>
                        <td style="font-family:monospace; font-weight:bold;">${item.time}</td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        });
    }

    // 8. 匯出 CSV 報表
    window.exportCSV = function() {
        if (allClockRecords.length === 0) { alert('無紀錄可匯出'); return; }
        let csv = "\uFEFF員工姓名,電子郵件,動作,日期,時間\n";
        [...allClockRecords].reverse().forEach(item => {
            csv += `"${item.name}","${item.email}","${item.type}","${item.date}","${item.time}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `出勤報表_${new Date().toISOString().split('T')[0]}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // 時鐘運作
    setInterval(() => {
        const now = new Date();
        document.getElementById('current-date').innerText = now.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
        document.getElementById('current-time').innerText = now.toLocaleTimeString('zh-TW', { hour12: false });
    }, 1000);
</script>

</body>
</html>
