<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企業雲端智能人事管理系統</title>
    <style>
        :root {
            --primary: #1e293b;
            --accent: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #334155;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 20px; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* 🛠️ 新增：全螢幕載入中遮罩，防止 F5 瞬間閃退回登入頁 */
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .container { width: 100%; max-width: 1100px; background: var(--card); border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 30px; display: none; }
        
        .auth-box { width: 100%; max-width: 400px; background: var(--card); padding: 35px 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: none; } /* 預設先隱藏，交由 JS 判斷 */
        .auth-box h2 { text-align: center; margin-bottom: 20px; color: var(--primary); font-weight: 700; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
        
        .btn { padding: 11px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; color: white; transition: background 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-accent { background-color: var(--accent); }
        .btn-accent:hover { background-color: #1d4ed8; }
        .btn-success { background-color: var(--success); }
        .btn-danger { background-color: var(--danger); }
        .btn-warning { background-color: var(--warning); }

        .auth-links { display: flex; justify-content: space-between; margin-top: 15px; font-size: 13px; }
        .auth-links a { color: var(--accent); text-decoration: none; cursor: pointer; }

        .main-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-bottom: 25px; }
        .btn-logout { width: auto; padding: 6px 12px; font-size: 13px; background-color: #64748b; }

        .system-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .tab-btn { padding: 8px 16px; border: none; background: none; font-size: 15px; font-weight: 600; color: #64748b; cursor: pointer; border-radius: 6px; }
        .tab-btn.active { background: #eff6ff; color: var(--accent); }

        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 25px; }
        @media(min-width: 768px) { .dashboard-grid { grid-template-columns: 1fr 1fr; } .full-width { grid-column: span 2; } }

        .card { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .card h3 { font-size: 16px; margin-bottom: 15px; color: var(--primary); display: flex; align-items: center; gap: 8px; border-left: 4px solid var(--accent); padding-left: 10px; }

        .clock-box { text-align: center; background: #fff; padding: 15px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 15px; }
        #current-time { font-size: 28px; font-weight: 700; color: var(--accent); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .info-list { list-style: none; max-height: 250px; overflow-y: auto; }
        .info-item { background: #fff; padding: 12px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 10px; font-size: 14px; }
        .info-item .time { font-size: 12px; color: #94a3b8; margin-top: 5px; text-align: right; }
        .badge-reminder { background-color: #fef3c7; color: #d97706; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-right: 5px; }
        .badge-leave-tag { background-color: #e0f2fe; color: #0369a1; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-right: 5px; }

        .admin-only { display: none; }
        .table-container { background: #fff; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-top: 10px; max-height: 400px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; }
        th, td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
        th { background-color: #f1f5f9; font-weight: 600; position: sticky; top: 0; }
        .badge { padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .badge-in { background-color: #dcfce7; color: var(--success); }
        .badge-out { background-color: #fee2e2; color: var(--danger); }
        .badge-leave { background-color: #fef3c7; color: #d97706; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="spinner"></div>
    <div style="color: #64748b; font-size: 14px; font-weight: 600;">雲端連線安全驗證中，請稍候...</div>
</div>

<div class="auth-box" id="login-section">
    <h2>員工登入</h2>
    <div class="form-group"><label>電子郵件 (Email)</label><input type="email" id="login-email" placeholder="example@company.com"></div>
    <div class="form-group"><label>密碼</label><input type="password" id="login-password" placeholder="請輸入密碼"></div>
    <button class="btn btn-accent" style="width:100%;" onclick="authAction('login')">安全登入</button>
    <div class="auth-links"><a onclick="switchAuthView('register')">註冊新帳號</a><a onclick="switchAuthView('forgot')">忘記密碼？</a></div>
</div>

<div class="auth-box" id="register-section">
    <h2>職員帳號註冊</h2>
    <div class="form-group"><label>真實姓名</label><input type="text" id="reg-name" placeholder="例如：張小明"></div>
    <div class="form-group"><label>電子郵件</label><input type="email" id="reg-email" placeholder="請填寫正確 Email"></div>
    <div class="form-group"><label>設定密碼 (至少 6 碼)</label><input type="password" id="reg-password" placeholder="請設定登入密碼"></div>
    <button class="btn btn-success" style="width:100%;" onclick="authAction('register')">建立帳號</button>
    <div class="auth-links" style="justify-content: center;"><a onclick="switchAuthView('login')">返回登入畫面</a></div>
</div>

<div class="auth-box" id="forgot-section">
    <h2>找回密碼</h2>
    <div class="form-group"><label>您的電子郵件</label><input type="email" id="forgot-email" placeholder="example@company.com"></div>
    <button class="btn btn-accent" style="width:100%;" onclick="authAction('forgot')">發送重設密碼信</button>
    <div class="auth-links" style="justify-content: center;"><a onclick="switchAuthView('login')">返回登入畫面</a></div>
</div>


<div class="container" id="main-system">
    <div class="main-header">
        <div class="user-info">歡迎回來，<strong id="user-display-name">載入中...</strong> [<span id="user-role-tag" style="color: var(--accent); font-weight: bold;">讀取中...</span>]</div>
        <button class="btn btn-logout" onclick="handleLogout()">登出系統</button>
    </div>

    <div class="system-tabs">
        <button class="tab-btn active" id="tab-clock" onclick="switchSystemPage('clock')">🕒 出勤打卡區</button>
        <button class="tab-btn" id="tab-leave" onclick="switchSystemPage('leave')">📝 線上請假單</button>
    </div>

    <div id="page-clock" class="dashboard-grid">
        <div class="card">
            <h3>⏰ 每日出勤簽到</h3>
            <div class="clock-box">
                <div id="current-date" style="font-size: 13px; color: #64748b;"></div>
                <div id="current-time">00:00:00</div>
            </div>
            <div class="form-group">
                <label>📍 工作地點 / 外勤與打卡備註（選填）</label>
                <input type="text" id="clock-note" placeholder="例如：總部辦公、台北A客戶外勤開會、在家遠端">
            </div>
            <div class="grid-2">
                <button class="btn btn-success" onclick="submitClock('上班')">🌅 上班打卡</button>
                <button class="btn btn-danger" onclick="submitClock('下班')">外出/下班</button>
            </div>
        </div>

        <div class="card">
            <h3>📢 公司公告與工作提醒</h3>
            <ul class="info-list" id="announcement-list"></ul>
        </div>
    </div>

    <div id="page-leave" class="dashboard-grid" style="display: none;">
        <div class="card">
            <h3>✍️ 填寫請假申請單</h3>
            <div class="form-group">
                <label>請假假別</label>
                <select id="leave-type">
                    <option value="事假">事假</option>
                    <option value="病假">病假</option>
                    <option value="特休">特休 / 年假</option>
                    <option value="婚喪公假">婚假 / 喪假 / 公假</option>
                </select>
            </div>
            <div class="form-group">
                <label>請假日期</label>
                <input type="date" id="leave-date">
            </div>
            <div class="form-group">
                <label>請假事由 / 說明</label>
                <textarea id="leave-reason" rows="3" placeholder="請簡單敘述請假原因..."></textarea>
            </div>
            <button class="btn btn-warning" style="width: 100%;" onclick="submitLeave()">發送請假申請</button>
        </div>

        <div class="card">
            <h3>📋 我的請假審核狀態</h3>
            <ul class="info-list" id="my-leave-list"></ul>
        </div>
    </div>

    <div class="card full-width admin-only" style="margin-top: 30px;">
        <h3>🛠️ 主管行政管理控制台</h3>
        <div class="grid-2" style="margin-bottom: 20px; background: #fff; padding: 15px; border-radius: 8px; border:1px solid var(--border)">
            <div>
                <h4 style="margin-bottom: 10px; font-size: 14px;">發布新公告 / 工作提醒</h4>
                <div class="form-group" style="margin-bottom:8px;">
                    <select id="msg-type">
                        <option value="公告">📢 一般公司公告</option>
                        <option value="提醒">⚠️ 緊急工作提醒</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom: 10px;">
                    <input type="text" id="msg-content" placeholder="請輸入發布內容...">
                </div>
                <button class="btn btn-accent" style="padding: 8px; width: 100%;" onclick="submitPost()">確認發布</button>
            </div>
            <div style="border-left: 1px solid var(--border); padding-left: 20px; display: flex; flex-direction: column; justify-content: center;">
                <h4 style="margin-bottom: 10px; font-size: 14px;">數據報表匯出</h4>
                <button class="btn btn-success" onclick="exportCSV()">📥 匯出全公司出勤與請假紀錄 (CSV)</button>
            </div>
        </div>

        <h4 style="font-size: 14px; margin-bottom: 5px;">全公司即時動態流水帳 (出勤 + 請假)</h4>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>員工姓名</th>
                        <th>帳號 (Email)</th>
                        <th>動態類型</th>
                        <th>日期</th>
                        <th>精準時間 / 請假原因</th>
                        <th>外勤與打卡備註</th>
                    </tr>
                </thead>
                <tbody id="admin-table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, set, get, child, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // ⚠️ 請在此處換上你專案的 Firebase Config 設定金鑰
    const firebaseConfig = {
        apiKey: "AIzaSyDfTTRHfVCW-QpAPYuoDA4absfWO9OARcY", 
        authDomain: "youcheng-656a8.firebaseapp.com",
        databaseURL: "https://youcheng-656a8-default-rtdb.firebaseio.com",
        projectId: "youcheng-656a8",
        storageBucket: "youcheng-656a8.firebasestorage.app",
        messagingSenderId: "197356167437",
        appId: "1:197356167437:web:fa86347694f3ab592a5044"
    }; // 👈 檢查這裡的 }; 有沒有漏掉，結尾要


    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentUserData = null;
    let currentAuthUser = null;
    let allMergedRecords = [];

    // 隱藏加載畫面輔助函式
    function hideLoading() {
        document.getElementById('loading-screen').style.display = 'none';
    }

    // 分頁切換邏輯
    window.switchSystemPage = function(page) {
        document.getElementById('page-clock').style.display = page === 'clock' ? 'grid' : 'none';
        document.getElementById('page-leave').style.display = page === 'leave' ? 'grid' : 'none';
        document.getElementById('tab-clock').className = page === 'clock' ? 'tab-btn active' : 'tab-btn';
        document.getElementById('tab-leave').className = page === 'leave' ? 'tab-btn active' : 'tab-btn';
    }

    // 驗證切換畫面控制
    window.switchAuthView = function(view) {
        document.getElementById('login-section').style.display = view === 'login' ? 'block' : 'none';
        document.getElementById('register-section').style.display = view === 'register' ? 'block' : 'none';
        document.getElementById('forgot-section').style.display = view === 'forgot' ? 'block' : 'none';
    }

    // 驗證核心動作
    window.authAction = function(type) {
        if (type === 'register') {
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            if (!name || !email || !password) { alert('請填寫所有欄位！'); return; }
            createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    set(ref(db, `users/${userCredential.user.uid}`), { name: name, email: email, role: 'staff' })
                    .then(() => alert('帳號註冊成功！已自動登入。'));
                }).catch(err => alert('註冊失敗：' + err.message));
        } else if (type === 'login') {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            if (!email || !password) { alert('請輸入帳號密碼！'); return; }
            signInWithEmailAndPassword(auth, email, password).catch(err => alert('登入失敗，請檢查密碼！'));
        } else if (type === 'forgot') {
            const email = document.getElementById('forgot-email').value.trim();
            if (!email) { alert('請輸入 Email！'); return; }
            sendPasswordResetEmail(auth, email).then(() => { alert('重設郵件已發送！'); switchAuthView('login'); }).catch(err => alert(err.message));
        }
    }

    // ⭐⭐⭐ 核心安全鎖：
