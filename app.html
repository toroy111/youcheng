<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企業全功能雲端人事管理系統</title>
    <style>
        :root {
            --primary: #1e293b;
            --accent: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #334155;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 20px; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        .container { width: 100%; max-width: 1000px; background: var(--card); border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 30px; display: none; }
        
        /* 1. 登入介面專用樣式 */
        .login-box { width: 100%; max-width: 400px; background: var(--card); padding: 40px 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        .login-box h2 { margin-bottom: 25px; color: var(--primary); font-weight: 700; }

        /* 公用表單與按鈕 */
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; outline: none; }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; color: white; transition: background 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-accent { background-color: var(--accent); }
        .btn-accent:hover { background-color: #1d4ed8; }
        .btn-success { background-color: var(--success); }
        .btn-danger { background-color: var(--danger); }

        /* 2. 主系統頂部列 */
        .main-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-bottom: 25px; }
        .user-info { font-size: 15px; }
        .btn-logout { width: auto; padding: 6px 12px; font-size: 13px; background-color: #64748b; }

        /* 區塊版面配置 */
        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 25px; }
        @media(min-width: 768px) { .dashboard-grid { grid-template-columns: 1fr 1fr; } .full-width { grid-column: span 2; } }

        /* 卡片元件 */
        .card { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .card h3 { font-size: 18px; margin-bottom: 15px; color: var(--primary); display: flex; align-items: center; gap: 8px; border-left: 4px solid var(--accent); padding-left: 10px; }

        /* 時鐘與打卡按鈕 */
        .clock-box { text-align: center; background: #fff; padding: 15px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 15px; }
        #current-time { font-size: 28px; font-weight: 700; color: var(--accent); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        /* 列表樣式 (公告、提醒) */
        .info-list { list-style: none; max-height: 200px; overflow-y: auto; }
        .info-item { background: #fff; padding: 12px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 10px; font-size: 14px; }
        .info-item .time { font-size: 12px; color: #94a3b8; margin-top: 5px; text-align: right; }
        .badge-reminder { background-color: #fef3c7; color: #d97706; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-right: 5px; }

        /* 權限控管隱藏區塊 */
        .admin-only { display: none; }

        /* 表格樣式 */
        .table-container { background: #fff; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th, td { padding: 12px 15px; border-bottom: 1px solid var(--border); }
        th { background-color: #f1f5f9; font-weight: 600; }
        .badge { padding: 3px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .badge-in { background-color: #dcfce7; color: var(--success); }
        .badge-out { background-color: #fee2e2; color: var(--danger); }
    </style>
</head>
<body>

<div class="login-box" id="login-section">
    <h2>企業系統登入</h2>
    <div class="form-group">
        <label for="login-id">員工編號</label>
        <input type="text" id="login-id" placeholder="請輸入您的員編 (如: EMP001)" autocomplete="off">
    </div>
    <button class="btn btn-accent" onclick="handleLogin()">安全登入</button>
</div>

<div class="container" id="main-system">
    <div class="main-header">
        <div class="user-info">
            歡迎回來，<strong id="user-display-name">載入中...</strong> 
            [<span id="user-role-tag" style="color: var(--accent); font-weight: bold;">職員</span>]
        </div>
        <button class="btn btn-logout" onclick="handleLogout()">登出系統</button>
    </div>

    <div class="dashboard-grid">
        <div class="card">
            <h3>⏰ 每日出勤簽到</h3>
            <div class="clock-box">
                <div id="current-date" style="font-size: 14px; color: #64748b;"></div>
                <div id="current-time">00:00:00</div>
            </div>
            <div class="grid-2">
                <button class="btn btn-success" onclick="submitClock('上班')">🌅 上班打卡</button>
                <button class="btn btn-danger" onclick="submitClock('下班')">外出/下班</button>
            </div>
        </div>

        <div class="card">
            <h3>📢 公司公告與工作提醒</h3>
            <ul class="info-list" id="announcement-list">
                </ul>
        </div>

        <div class="card full-width admin-only">
            <h3>🛠️ 主管行政管理控制台</h3>
            <div class="grid-2" style="margin-bottom: 20px; background: #fff; padding: 15px; border-radius: 8px; border:1px solid var(--border)">
                <div>
                    <h4 style="margin-bottom: 10px; font-size: 15px;">發布新公告 / 工作提醒</h4>
                    <div class="form-group">
                        <select id="msg-type">
                            <option value="公告">📢 一般公司公告</option>
                            <option value="提醒">⚠️ 緊急工作提醒</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 10px;">
                        <input type="text" id="msg-content" placeholder="請輸入發布內容...">
                    </div>
                    <button class="btn btn-accent" style="padding: 8px;" onclick="submitPost()">確認發布</button>
                </div>
                <div style="border-left: 1px solid var(--border); padding-left: 20px; display: flex; flex-direction: column; justify-content: center;">
                    <h4 style="margin-bottom: 10px; font-size: 15px;">數據報表匯出</h4>
                    <button class="btn btn-success" onclick="exportCSV()">📥 匯出全公司打卡紀錄 (CSV)</button>
                </div>
            </div>

            <h4 style="font-size: 15px; margin-bottom: 5px;">全公司即時打卡流水帳</h4>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>員工</th>
                            <th>打卡類型</th>
                            <th>日期</th>
                            <th>精準時間</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, child, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // ⚠️ 請填入您的 Firebase 設定
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_ID.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 當前登入的使用者暫存資料
    let currentUser = null;
    let allClockRecords = []; 

    // 時鐘動態運作
    setInterval(() => {
        const now = new Date();
        document.getElementById('current-date').innerText = now.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
        document.getElementById('current-time').innerText = now.toLocaleTimeString('zh-TW', { hour12: false });
    }, 1000);

    // 1. 處理登入驗證
    window.handleLogin = function() {
        const inputId = document.getElementById('login-id').value.trim().toUpperCase();
        if (!inputId) { alert('請輸入員工編號！'); return; }

        // 到 Firebase 尋找該員工資料
        get(child(ref(db), `users/${inputId}`)).then((snapshot) => {
            if (snapshot.exists()) {
                const userData = snapshot.val();
                currentUser = { id: inputId, name: userData.name, role: userData.role };
                
                // 登入成功，切換畫面
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('main-system').style.display = 'block';
                document.body.style.alignItems = 'flex-start';

                // 渲染使用者資訊
                document.getElementById('user-display-name').innerText = `${currentUser.name} (${currentUser.id})`;
                document.getElementById('user-role-tag').innerText = currentUser.role === 'admin' ? '最高管理權限 / 主管' : '一般職員';

                // ⭐⭐⭐ 關鍵權限判定：如果是主管(admin)，就把隱藏的管理功能打開
                if (currentUser.role === 'admin') {
                    document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
                } else {
                    document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
                }

                // 啟動雲端即時監聽（公告、打卡紀錄）
                initDataListeners();
            } else {
                alert('登入失敗：找不到此員工編號，請與行政人員確認！');
            }
        }).catch((error) => {
            alert('連線錯誤：' + error.message);
        });
    }

    // 2. 登出
    window.handleLogout = function() {
        currentUser = null;
        document.getElementById('login-id').value = '';
        document.getElementById('login-section').style.display = 'block';
        document.getElementById('main-system').style.display = 'none';
        document.body.style.alignItems = 'center';
    }

    // 3. 員工打卡提交
    window.submitClock = function(type) {
        if (!currentUser) return;
        const now = new Date();
        const dateStr = now.toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' });
        const timeStr = now.toLocaleTimeString('zh-TW', { hour12: false });

        const log = {
            empId: currentUser.id,
            name: currentUser.name,
            type: type,
            date: dateStr,
            time: timeStr,
            timestamp: Date.now()
        };

        push(ref(db, 'clock_records'), log).then(() => {
            alert(`【${type}打卡成功】\n時間：${timeStr}\n資料已即時同步至雲端伺服器。`);
        });
    }

    // 4. 主管發布公告 / 提醒
    window.submitPost = function() {
        const type = document.getElementById('msg-type').value;
        const content = document.getElementById('msg-content').value.trim();
        if (!content) { alert('發布內容不能為空喔！'); return; }

        const post = {
            type: type,
            content: content,
            timestamp: Date.now()
        };

        push(ref(db, 'announcements'), post).then(() => {
            alert('發布成功！');
            document.getElementById('msg-content').value = '';
        });
    }

    // 5. 雲端即時數據監聽器
    function initDataListeners() {
        // 監聽公告與提醒
        onValue(ref(db, 'announcements'), (snapshot) => {
            const listEl = document.getElementById('announcement-list');
            listEl.innerHTML = '';
            const data = snapshot.val();
            if (!data) {
                listEl.innerHTML = '<li class="info-item">目前沒有任何公告。</li>';
                return;
            }
            
            // 轉成陣列並由新到舊排序
            const arr = Object.keys(data).map(k => data[k]).sort((a,b) => b.timestamp - a.timestamp);
            arr.forEach(item => {
                const li = document.createElement('li');
                li.className = 'info-item';
                const prefix = item.type === '提醒' ? '<span class="badge-reminder">工作提醒</span>' : '📢 ';
                const timeStr = new Date(item.timestamp).toLocaleString('zh-TW', {hour12:false});
                li.innerHTML = `<div>${prefix} ${item.content}</div><div class="time">${timeStr}</div>`;
                listEl.appendChild(li);
            });
        });

        // 監聽全公司打卡紀錄 (主管面版專用)
        onValue(ref(db, 'clock_records'), (snapshot) => {
            allClockRecords = [];
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = '';
            
            const data = snapshot.val();
            if (!data) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#94a3b8">尚無打卡歷史資料</td></tr>';
                return;
            }

            Object.keys(data).forEach(k => allClockRecords.push(data[k]));
            // 由新到舊排序
            allClockRecords.sort((a,b) => b.timestamp - a.timestamp);

            // 如果是主管才渲染表格內容以節省資源
            if (currentUser.role === 'admin') {
                allClockRecords.forEach(item => {
                    const tr = document.createElement('tr');
                    const badgeClass = item.type === '上班' ? 'badge-in' : 'badge-out';
                    tr.innerHTML = `
                        <td><strong>${item.name}</strong> (${item.empId})</td>
                        <td><span class="badge ${badgeClass}">${item.type}</span></td>
                        <td>${item.date}</td>
                        <td style="font-family:monospace; font-weight:bold;">${item.time}</td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        });
    }

    // 6. 主管匯出 CSV 報表
    window.exportCSV = function() {
        if (allClockRecords.length === 0) { alert('資料庫目前沒有打卡紀錄可匯出'); return; }
        let csv = "\uFEFF員工編號,員工姓名,動作,日期,時間\n";
        [...allClockRecords].reverse().forEach(item => {
            csv += `"${item.empId}","${item.name}","${item.type}","${item.date}","${item.time}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `公司總打卡出勤報表_${new Date().toISOString().split('T')[0]}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
